server.port=8080
spring.threads.virtual.enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=checking-account-group-v6
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.properties.security.protocol=PLAINTEXT
spring.kafka.properties.request.timeout.ms=30000

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.datasource.url=jdbc:postgresql://localhost:5432/checking_account
spring.datasource.username=qa_user
spring.datasource.password=qa_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true