name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.4.0 
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Environment
        # Prepara a infraestrutura apontando nativamente para a subpasta do projeto
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: checking-account-operation

      - name: Compile and Execute Tests
        # Executa o wrapper diretamente apontando para a subpasta sem quebrar o Bash
        run: ./checking-account-operation/gradlew test --project-dir checking-account-operation --info
