name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        # Fixando a tag exata estável com suporte nativo ao Node 24
        uses: actions/checkout@v4.2.2 

      - name: Setup Java JDK 17
        # Fixando a tag exata estável com suporte nativo ao Node 24
        uses: actions/setup-java@v4.4.0 
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Compile and Execute Tests
        # Mantém a flag que impede os listeners do Kafka de tentarem iniciar na nuvem
        run: ./gradlew test -Dspring.kafka.listener.auto-startup=false --info
