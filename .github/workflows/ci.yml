name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Assemble Java Code
        # O comando cd $GITHUB_WORKSPACE limpa o cache e força a navegação para o local real no Linux
        run: |
          cd $GITHUB_WORKSPACE/checking-account-operation
          chmod +x gradlew
          ./gradlew assemble --no-daemon
