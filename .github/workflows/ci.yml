name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.4.0 
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Compile and Execute Tests
        # Executa os testes normalmente coletando os relatórios físicos
        run: ./gradlew test --continue

      - name: Publish Test Report on Failure
        # Esse passo lê os relatórios do JUnit e plota o erro exato no painel do GitHub se algo falhar
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
