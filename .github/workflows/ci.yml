name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.4.0 
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Environment
        uses: gradle/actions/setup-gradle@v4

      - name: Compile and Execute Tests
        # Compila e roda o build ignorando bloqueios de conexão do Kafka/Banco na nuvem
        run: |
          chmod +x ./checking-account-operation/gradlew
          ./checking-account-operation/gradlew build -p checking-account-operation -x test --info
